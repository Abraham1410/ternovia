name: ternovia
description: "Aplikasi Ternovia - Sistem Manajemen Peternakan Dinas Peternakan Kabupaten Jombang"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.0
  flutter: ">=3.38.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  flutter_screenutil: ^5.9.3
  go_router: ^14.8.1
  google_fonts: ^6.3.3
  intl: ^0.19.0
  shared_preferences: ^2.3.4
  flutter_svg: ^2.0.16

  # Image picker (kamera + galeri)
  image_picker: ^1.1.2

  # Native share (WhatsApp, copy, email, dll)
  # Pakai constraint yang loose biar kompatibel dengan dep tree
  share_plus: ^10.0.0

  # File picker (PDF upload buat dokumentasi SKT)
  file_picker: ^8.0.0

  # PDF viewer — render PDF dalam app (buat preview dokumen SKT)
  flutter_pdfview: ^1.3.2

  # Path provider — akses app's document directory (buat copy file upload
  # ke internal storage biar path persistent)
  path_provider: ^2.1.4

  # PDF generation — buat generate SKT output file yang bisa di-download
  pdf: ^3.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/illustrations/
